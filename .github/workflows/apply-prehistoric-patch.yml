name: Apply PrehistoricRush forest patch

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-prehistoric-patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Reconstruct and apply patch
        run: |
          set -euo pipefail
          cat .agent/staging/prehistoric-patch.part00 \
              .agent/staging/prehistoric-patch.part01 \
              .agent/staging/prehistoric-patch.part02 \
              .agent/staging/prehistoric-patch.part03 > /tmp/prehistoric-patch.b64
          base64 --decode /tmp/prehistoric-patch.b64 > /tmp/prehistoric-patch.zip
          mkdir -p /tmp/prehistoric-patch
          unzip -q /tmp/prehistoric-patch.zip -d /tmp/prehistoric-patch
          cp -R /tmp/prehistoric-patch/src/. src/
          cp /tmp/prehistoric-patch/smoke-test.mjs ./smoke-test.mjs
          cp /tmp/prehistoric-patch/dino-smoke-test.mjs ./dino-smoke-test.mjs
          node --check src/game.js
          find src/domains -name '*.js' -print0 | xargs -0 -n1 node --check
          node smoke-test.mjs
          node dino-smoke-test.mjs
          rm -rf .agent/staging
          rm -f .github/workflows/apply-prehistoric-patch.yml
      - name: Commit to main
        run: |
          set -euo pipefail
          git config user.name 'LuminaryLabs Automation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Build giant forest and skinned procedural raptor'
          git push origin HEAD:main
