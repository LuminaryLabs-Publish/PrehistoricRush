          export const PROTOKITS_COMMIT = "11d245913ba4d30f3ce950eb5a17e1cc6e4aa1f5";
          export const THREE_VERSION = "0.179.1";
          export const RAPIER_VERSION = "0.15.0";

          export const RUNTIME_URLS = Object.freeze({
