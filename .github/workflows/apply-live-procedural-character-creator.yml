name: Apply live procedural character creator

on:
  push:
    branches: [main]
    paths:
      - .agent/apply-live-procedural-character-creator

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Apply shared generator and damped showcase
        shell: bash
        run: |
          set -o pipefail
          {
          set -euo pipefail
          mkdir -p src/render src/character-creator src/shared

          cat > src/shared/runtime-versions.js <<'JS'
