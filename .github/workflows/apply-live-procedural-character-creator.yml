          cat > src/render/three-procedural-creature.js <<'JS'
          const clamp01 = (value) => Math.max(0, Math.min(1, Number(value) || 0));
          const dampingAlpha = (sharpness, dt) => 1 - Math.exp(-Math.max(0, sharpness) * Math.max(0, dt));

          function materialsOf(mesh) {
            return Array.isArray(mesh?.material) ? mesh.material : mesh?.material ? [mesh.material] : [];
          }

          export function createCreatureMesh(THREE, descriptor, options = {}) {
            if (!descriptor?.geometry || !descriptor?.skeleton) throw new TypeError("A procedural creature descriptor is required.");
            const geometry = new THREE.BufferGeometry();
            geometry.setIndex(descriptor.geometry.indices);
            geometry.setAttribute("position", new THREE.Float32BufferAttribute(descriptor.geometry.positions, 3));
            geometry.setAttribute("normal", new THREE.Float32BufferAttribute(descriptor.geometry.normals, 3));
            geometry.setAttribute("color", new THREE.Float32BufferAttribute(descriptor.geometry.colors, 3));
            geometry.setAttribute("skinIndex", new THREE.Uint16BufferAttribute(descriptor.geometry.skinIndices, 4));
            geometry.setAttribute("skinWeight", new THREE.Float32BufferAttribute(descriptor.geometry.skinWeights, 4));
            geometry.computeBoundingBox();
            geometry.computeBoundingSphere();

            const boneById = {};
            const orderedBones = descriptor.skeleton.bones.map((definition) => {
              const bone = new THREE.Bone();
              bone.name = definition.id;
              bone.position.set(...definition.position);
              bone.quaternion.set(...definition.rotation);
              boneById[definition.id] = bone;
              return bone;
            });
            descriptor.skeleton.bones.forEach((definition) => {
              if (definition.parentId) boneById[definition.parentId].add(boneById[definition.id]);
            });

            const opacity = options.opacity == null ? 1 : clamp01(options.opacity);
            const material = new THREE.MeshStandardMaterial({
              vertexColors: true,
              roughness: descriptor.material.roughness,
              metalness: descriptor.material.metalness,
              transparent: opacity < 0.999,
              opacity,
              depthWrite: opacity >= 0.999
            });
            const mesh = new THREE.SkinnedMesh(geometry, material);
            const root = boneById[descriptor.skeleton.rootBoneId];
            mesh.add(root);
            root.updateMatrixWorld(true);
            const skeleton = new THREE.Skeleton(orderedBones);
            mesh.bind(skeleton);
            mesh.normalizeSkinWeights();
            mesh.scale.set(...descriptor.transform.scale);
            mesh.castShadow = options.castShadow ?? true;
            mesh.receiveShadow = options.receiveShadow ?? true;
            mesh.userData = { bodyDescriptor: descriptor, boneById };
            return mesh;
          }

          export function applyCreaturePose(mesh, pose) {
            const boneById = mesh?.userData?.boneById ?? {};
            for (const [boneId, transform] of Object.entries(pose?.bones ?? {})) {
              const bone = boneById[boneId];
              if (!bone) continue;
              if (transform.position) bone.position.set(...transform.position);
              if (transform.rotationEuler) bone.rotation.set(...transform.rotationEuler);
            }
            mesh?.skeleton?.update();
          }

          function dampAngle(current, target, alpha) {
            let delta = target - current;
            while (delta > Math.PI) delta -= Math.PI * 2;
            while (delta < -Math.PI) delta += Math.PI * 2;
            return current + delta * alpha;
          }

          export function applyCreaturePoseDamped(mesh, pose, dt, sharpness = 14) {
            const alpha = dampingAlpha(sharpness, dt);
            const boneById = mesh?.userData?.boneById ?? {};
            for (const [boneId, transform] of Object.entries(pose?.bones ?? {})) {
              const bone = boneById[boneId];
              if (!bone) continue;
              if (transform.position) {
                bone.position.x += (transform.position[0] - bone.position.x) * alpha;
                bone.position.y += (transform.position[1] - bone.position.y) * alpha;
                bone.position.z += (transform.position[2] - bone.position.z) * alpha;
              }
              if (transform.rotationEuler) {
                bone.rotation.x = dampAngle(bone.rotation.x, transform.rotationEuler[0], alpha);
                bone.rotation.y = dampAngle(bone.rotation.y, transform.rotationEuler[1], alpha);
                bone.rotation.z = dampAngle(bone.rotation.z, transform.rotationEuler[2], alpha);
              }
            }
            mesh?.skeleton?.update();
          }

          export function setCreatureOpacity(mesh, opacity) {
            const next = clamp01(opacity);
            for (const material of materialsOf(mesh)) {
              material.transparent = next < 0.999;
              material.opacity = next;
              material.depthWrite = next >= 0.999;
              material.needsUpdate = true;
            }
          }

          export function hasCompatibleCreatureTopology(left, right) {
            if (!left?.geometry || !right?.geometry) return false;
            const arraysMatch = ["positions", "normals", "colors", "indices", "skinIndices", "skinWeights"]
              .every((key) => left.geometry[key]?.length === right.geometry[key]?.length);
            if (!arraysMatch) return false;
            const leftBones = left.skeleton?.bones ?? [];
            const rightBones = right.skeleton?.bones ?? [];
            return leftBones.length === rightBones.length && leftBones.every((bone, index) => bone.id === rightBones[index]?.id);
          }

          function dampArray(current, target, alpha) {
            let maximumDelta = 0;
            for (let index = 0; index < current.length; index += 1) {
              const delta = target[index] - current[index];
              current[index] += delta * alpha;
              maximumDelta = Math.max(maximumDelta, Math.abs(delta));
            }
            return maximumDelta;
          }

          function normalizeNormals(array) {
            for (let index = 0; index < array.length; index += 3) {
              const length = Math.hypot(array[index], array[index + 1], array[index + 2]) || 1;
              array[index] /= length;
              array[index + 1] /= length;
              array[index + 2] /= length;
            }
          }

          export function dampCreatureMeshTowardDescriptor(mesh, descriptor, dt, sharpness = 10) {
            if (!hasCompatibleCreatureTopology(mesh?.userData?.bodyDescriptor, descriptor)) {
              throw new RangeError("Cannot damp between incompatible creature topologies.");
            }
            const alpha = dampingAlpha(sharpness, dt);
            const geometry = mesh.geometry;
            const position = geometry.getAttribute("position");
            const normal = geometry.getAttribute("normal");
            const color = geometry.getAttribute("color");
            let maximumDelta = dampArray(position.array, descriptor.geometry.positions, alpha);
            maximumDelta = Math.max(maximumDelta, dampArray(normal.array, descriptor.geometry.normals, alpha));
            maximumDelta = Math.max(maximumDelta, dampArray(color.array, descriptor.geometry.colors, alpha));
            normalizeNormals(normal.array);
            position.needsUpdate = true;
            normal.needsUpdate = true;
            color.needsUpdate = true;

            const targetScale = descriptor.transform.scale;
            maximumDelta = Math.max(
              maximumDelta,
              Math.abs(targetScale[0] - mesh.scale.x),
              Math.abs(targetScale[1] - mesh.scale.y),
              Math.abs(targetScale[2] - mesh.scale.z)
            );
            mesh.scale.x += (targetScale[0] - mesh.scale.x) * alpha;
            mesh.scale.y += (targetScale[1] - mesh.scale.y) * alpha;
            mesh.scale.z += (targetScale[2] - mesh.scale.z) * alpha;

            for (const material of materialsOf(mesh)) {
              maximumDelta = Math.max(
                maximumDelta,
                Math.abs(descriptor.material.roughness - material.roughness),
                Math.abs(descriptor.material.metalness - material.metalness)
              );
              material.roughness += (descriptor.material.roughness - material.roughness) * alpha;
              material.metalness += (descriptor.material.metalness - material.metalness) * alpha;
            }

            if (maximumDelta < 0.0005) {
              position.array.set(descriptor.geometry.positions);
              normal.array.set(descriptor.geometry.normals);
              color.array.set(descriptor.geometry.colors);
              position.needsUpdate = normal.needsUpdate = color.needsUpdate = true;
              mesh.scale.set(...targetScale);
              mesh.userData.bodyDescriptor = descriptor;
              geometry.computeBoundingBox();
              geometry.computeBoundingSphere();
            }
            return maximumDelta;
          }

          export function disposeCreatureMesh(mesh) {
            if (!mesh) return;
            mesh.parent?.remove(mesh);
            mesh.geometry?.dispose?.();
            for (const material of materialsOf(mesh)) material.dispose?.();
            mesh.skeleton?.dispose?.();
          }
          JS

          cat > src/character-creator/character-preview-transition.js <<'JS'
          import {
            applyCreaturePoseDamped,
            createCreatureMesh,
            dampCreatureMeshTowardDescriptor,
            disposeCreatureMesh,
            hasCompatibleCreatureTopology,
            setCreatureOpacity
          } from "../render/three-procedural-creature.js";

          const smoothStep = (value) => {
            const t = Math.max(0, Math.min(1, value));
            return t * t * (3 - 2 * t);
          };

          export function createCharacterPreviewTransition(options) {
            const {
              THREE,
              scene,
              creatureApi,
              initialProfile,
              morphSharpness = 10,
              poseSharpness = 15,
              crossfadeDuration = 0.22
            } = options;
            if (!THREE || !scene || !creatureApi || !initialProfile) throw new TypeError("Preview transition dependencies are required.");

            let currentDescriptor = creatureApi.create(initialProfile.creature);
            let targetDescriptor = currentDescriptor;
            let currentMesh = createCreatureMesh(THREE, currentDescriptor);
            let targetRevision = initialProfile.revision;
            let appliedRevision = initialProfile.revision;
            let crossfade = null;
            scene.add(currentMesh);

            function finishCrossfade() {
              if (!crossfade) return;
              setCreatureOpacity(crossfade.nextMesh, 1);
              disposeCreatureMesh(crossfade.previousMesh);
              currentMesh = crossfade.nextMesh;
              currentDescriptor = crossfade.descriptor;
              targetDescriptor = crossfade.descriptor;
              appliedRevision = crossfade.revision;
              crossfade = null;
            }

            function setTargetProfile(profile) {
              if (!profile?.creature) throw new TypeError("A character profile with a creature recipe is required.");
              if (crossfade) finishCrossfade();
              const descriptor = creatureApi.create(profile.creature);
              targetRevision = Number(profile.revision ?? targetRevision);
              if (hasCompatibleCreatureTopology(currentDescriptor, descriptor)) {
                targetDescriptor = descriptor;
                currentDescriptor = descriptor;
                return { mode: "damped-morph", revision: targetRevision };
              }

              const nextMesh = createCreatureMesh(THREE, descriptor, { opacity: 0 });
              nextMesh.position.copy(currentMesh.position);
              nextMesh.rotation.copy(currentMesh.rotation);
              scene.add(nextMesh);
              crossfade = {
                previousMesh: currentMesh,
                nextMesh,
                descriptor,
                revision: targetRevision,
                elapsed: 0
              };
              return { mode: "topology-crossfade", revision: targetRevision };
            }

            function update(dt, poseState = {}, rotationY = 0) {
              const frameTime = Math.max(0, Math.min(1 / 20, Number(dt) || 0));
              const pose = creatureApi.createPose(targetDescriptor.id, poseState);
              if (crossfade) {
                crossfade.elapsed += frameTime;
                const blend = smoothStep(crossfade.elapsed / crossfadeDuration);
                setCreatureOpacity(crossfade.previousMesh, 1 - blend);
                setCreatureOpacity(crossfade.nextMesh, blend);
                crossfade.previousMesh.rotation.y = rotationY;
                crossfade.nextMesh.rotation.y = rotationY;
                applyCreaturePoseDamped(crossfade.previousMesh, pose, frameTime, poseSharpness);
                applyCreaturePoseDamped(crossfade.nextMesh, pose, frameTime, poseSharpness);
                if (blend >= 1) finishCrossfade();
                return;
              }

              currentMesh.rotation.y = rotationY;
              const difference = dampCreatureMeshTowardDescriptor(currentMesh, targetDescriptor, frameTime, morphSharpness);
              applyCreaturePoseDamped(currentMesh, pose, frameTime, poseSharpness);
              if (difference < 0.0005) appliedRevision = targetRevision;
            }

            return Object.freeze({
              setTargetProfile,
              update,
              getMesh: () => currentMesh,
              getState: () => ({
                targetRevision,
                appliedRevision,
                transitioning: Boolean(crossfade),
                mode: crossfade ? "topology-crossfade" : appliedRevision === targetRevision ? "settled" : "damped-morph"
              }),
              dispose() {
                if (crossfade) {
                  disposeCreatureMesh(crossfade.previousMesh);
                  disposeCreatureMesh(crossfade.nextMesh);
                  crossfade = null;
                } else {
                  disposeCreatureMesh(currentMesh);
                }
              }
            });
          }
          JS

          cat > src/pages/character-creator.js <<'JS'
          import {
            loadPlayerCharacterProfile,
            patchPlayerCharacterProfile,
            resetPlayerCharacterProfile,
            subscribePlayerCharacterProfile
          } from "../shared/player-character-store.js";
          import { RUNTIME_URLS } from "../shared/runtime-versions.js";
          import { createCharacterPreviewTransition } from "../character-creator/character-preview-transition.js";

          const root = document.querySelector("#app") ?? document.body;
          let draft = loadPlayerCharacterProfile();
          let saveTimer = 0;
          let previewTransition = null;
          let disposeShowcase = () => {};

          Object.assign(document.body.style, {
            margin: "0",
            minHeight: "100vh",
            background: "linear-gradient(135deg,#0a160f,#183322 55%,#09110c)",
            color: "#fff3c8",
            fontFamily: "system-ui,sans-serif"
          });

          root.innerHTML = `
            <main style="min-height:100vh;padding:24px;box-sizing:border-box">
              <section style="max-width:1180px;margin:0 auto">
                <header style="display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:22px">
                  <div>
                    <p style="margin:0 0 6px;color:#8fd487;font-weight:800;letter-spacing:.12em;text-transform:uppercase">Prehistoric Rush</p>
                    <h1 style="margin:0;font-size:clamp(34px,6vw,64px)">Character Creator</h1>
                    <p style="color:#c9d7c4;max-width:700px">The showcase and game use the same procedural creature generator and skinned-mesh adapter.</p>
                  </div>
                  <nav style="display:flex;gap:10px;flex-wrap:wrap">
                    <a href="./menu.html" style="padding:11px 16px;border-radius:999px;background:#ffffff18;color:#fff3c8;text-decoration:none;font-weight:800">Menu</a>
                    <a href="./game.html" style="padding:11px 16px;border-radius:999px;background:#ffd37a;color:#211704;text-decoration:none;font-weight:900">Play Raptor</a>
                  </nav>
                </header>

                <div style="display:grid;grid-template-columns:minmax(360px,1.35fr) minmax(320px,1fr);gap:18px" id="creator-grid">
                  <section style="padding:18px;border-radius:24px;background:#07110cdd;border:1px solid #ffffff18">
                    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px">
                      <h2 style="margin:0">Live 3D Showcase</h2>
                      <span id="preview-status" style="color:#a9c8a4;font-size:13px">Loading generator…</span>
                    </div>
                    <div id="preview" style="position:relative;min-height:520px;height:min(62vh,680px);border-radius:20px;overflow:hidden;background:radial-gradient(circle at 50% 30%,#294b34,#0b1710 72%)"></div>
                    <pre id="profile-json" style="white-space:pre-wrap;word-break:break-word;max-height:190px;overflow:auto;background:#0005;padding:14px;border-radius:14px;color:#bde5b7;font-size:11px;margin:14px 0 0"></pre>
                  </section>

                  <section style="padding:22px;border-radius:24px;background:#07110cdd;border:1px solid #ffffff18">
                    <div id="controls" style="display:grid;gap:20px"></div>
                    <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:22px;flex-wrap:wrap">
                      <span id="save-status" style="color:#a9c8a4">Saved</span>
                      <button id="reset-profile" type="button" style="padding:10px 16px;border:0;border-radius:999px;background:#5d2b26;color:#fff3e5;font-weight:800;cursor:pointer">Reset Defaults</button>
                    </div>
                  </section>
                </div>
              </section>
            </main>
          `;

          const controls = document.querySelector("#controls");
          const preview = document.querySelector("#preview");
          const previewStatus = document.querySelector("#preview-status");
          const profileJson = document.querySelector("#profile-json");
          const saveStatus = document.querySelector("#save-status");

          const definitions = [
            ["Body Scale", "proportions", "bodyScale", 0.55, 1.35, 0.01, false],
            ["Body Length", "proportions", "bodyLength", 0.85, 2.2, 0.01, false],
            ["Tail Length", "proportions", "tailLength", 0.8, 3.2, 0.01, false],
            ["Leg Length", "proportions", "legLength", 0.45, 1.35, 0.01, false],
            ["Head Forward", "proportions", "headForward", 0.65, 1.7, 0.01, false],
            ["Stride Swing", "animation", "strideSwing", 0.25, 1.5, 0.01, false],
            ["Tail Follow", "animation", "tailFollow", 0, 0.35, 0.01, false],
            ["Radial Segments", "topology", "radialSegments", 6, 18, 1, true],
            ["Tail Segments", "topology", "tailSegments", 3, 14, 1, true]
          ];

          function controlMarkup() {
            const numeric = definitions.map(([label, group, key, min, max, step]) => `
              <label style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center">
                <span>${label}</span>
                <output data-output="${group}.${key}" style="color:#a9d79e"></output>
                <input data-group="${group}" data-key="${key}" type="range" min="${min}" max="${max}" step="${step}" style="grid-column:1/-1;width:100%">
              </label>
            `).join("");
            return `
              <div style="display:grid;gap:15px">
                <h2 style="margin:0">Body, Motion, and Topology</h2>
                ${numeric}
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <label style="display:grid;gap:8px">Skin Color<input data-color="skin" type="color" style="width:100%;height:48px;border:0;background:none"></label>
                <label style="display:grid;gap:8px">Underbelly<input data-color="underbelly" type="color" style="width:100%;height:48px;border:0;background:none"></label>
              </div>
            `;
          }

          controls.innerHTML = controlMarkup();

          function readValue(group, key) {
            return draft.creature.preset[group][key];
          }

          function renderControls() {
            const preset = draft.creature.preset;
            for (const input of controls.querySelectorAll("input[data-group]")) {
              const value = readValue(input.dataset.group, input.dataset.key);
              input.value = String(value);
              const definition = definitions.find((item) => item[1] === input.dataset.group && item[2] === input.dataset.key);
              const output = controls.querySelector(`[data-output="${input.dataset.group}.${input.dataset.key}"]`);
              if (output) output.textContent = definition?.[6] ? String(Math.round(value)) : Number(value).toFixed(2);
            }
            for (const input of controls.querySelectorAll("input[data-color]")) input.value = preset.material[input.dataset.color];
            profileJson.textContent = JSON.stringify(draft, null, 2);
          }

          function updateDraft(patch) {
            draft = {
              ...draft,
              creature: {
                ...draft.creature,
                preset: {
                  ...draft.creature.preset,
                  ...patch
                }
              }
            };
            renderControls();
            previewTransition?.setTargetProfile(draft);
            saveStatus.textContent = "Saving…";
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
              draft = patchPlayerCharacterProfile({ creature: { preset: patch } });
              saveStatus.textContent = `Saved revision ${draft.revision}`;
              previewTransition?.setTargetProfile(draft);
              renderControls();
            }, 160);
          }

          controls.addEventListener("input", (event) => {
            const input = event.target;
            if (input.dataset.group && input.dataset.key) {
              const definition = definitions.find((item) => item[1] === input.dataset.group && item[2] === input.dataset.key);
              const value = definition?.[6] ? Math.round(Number(input.value)) : Number(input.value);
              updateDraft({
                [input.dataset.group]: {
                  ...draft.creature.preset[input.dataset.group],
                  [input.dataset.key]: value
                }
              });
            } else if (input.dataset.color) {
              updateDraft({
                material: {
                  ...draft.creature.preset.material,
                  [input.dataset.color]: input.value
                }
              });
            }
          });

          document.querySelector("#reset-profile").addEventListener("click", () => {
            clearTimeout(saveTimer);
            draft = resetPlayerCharacterProfile();
            previewTransition?.setTargetProfile(draft);
            saveStatus.textContent = `Reset to revision ${draft.revision}`;
            renderControls();
          });

          subscribePlayerCharacterProfile(({ source, profile }) => {
            if (source === "local") return;
            draft = profile;
            previewTransition?.setTargetProfile(draft);
            saveStatus.textContent = `Updated from ${source}`;
            renderControls();
          });

          async function startShowcase() {
            const [NexusEngine, SeedModule, CreatureModule, THREE] = await Promise.all([
              import(RUNTIME_URLS.nexus),
              import(RUNTIME_URLS.seedKit),
              import(RUNTIME_URLS.creatureKit),
              import(RUNTIME_URLS.three)
            ]);
            if (!NexusEngine?.createRealtimeGame || !SeedModule?.createSeedKit || !CreatureModule?.createProceduralCreatureBodyKit || !THREE?.WebGLRenderer) {
              throw new Error("Required procedural preview modules did not load.");
            }

            const engine = NexusEngine.createRealtimeGame({
              kits: [
                SeedModule.createSeedKit({ seed: draft.creature.seed }),
                CreatureModule.createProceduralCreatureBodyKit({ creatures: [draft.creature] })
              ]
            });
            const creatureApi = engine.n.proceduralCreatureBody;
            if (!creatureApi) throw new Error("Procedural creature body service did not install.");

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x102318);
            scene.fog = new THREE.Fog(0x102318, 10, 24);
            const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 60);
            camera.position.set(4.6, 2.7, 6.7);
            camera.lookAt(0, 0.75, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            preview.replaceChildren(renderer.domElement);

            const platform = new THREE.Mesh(
              new THREE.CylinderGeometry(3.3, 3.5, 0.24, 64),
              new THREE.MeshStandardMaterial({ color: 0x304d31, roughness: 0.88 })
            );
            platform.position.y = -0.25;
            platform.receiveShadow = true;
            scene.add(platform);
            const ring = new THREE.Mesh(
              new THREE.TorusGeometry(2.65, 0.025, 8, 96),
              new THREE.MeshBasicMaterial({ color: 0x9fbd73 })
            );
            ring.rotation.x = Math.PI / 2;
            ring.position.y = -0.115;
            scene.add(ring);

            scene.add(new THREE.HemisphereLight(0xc8dfc0, 0x162018, 2.1));
            const key = new THREE.DirectionalLight(0xffe0aa, 3.3);
            key.position.set(4, 7, 5);
            key.castShadow = true;
            key.shadow.mapSize.set(1024, 1024);
            key.shadow.camera.left = -5;
            key.shadow.camera.right = 5;
            key.shadow.camera.top = 5;
            key.shadow.camera.bottom = -5;
            scene.add(key);
            const rim = new THREE.DirectionalLight(0x76b8ff, 1.6);
            rim.position.set(-5, 4, -4);
            scene.add(rim);

            previewTransition = createCharacterPreviewTransition({
              THREE,
              scene,
              creatureApi,
              initialProfile: draft
            });
            previewTransition.getMesh().position.y = 0;

            const resize = () => {
              const width = Math.max(1, preview.clientWidth);
              const height = Math.max(1, preview.clientHeight);
              renderer.setSize(width, height, false);
              camera.aspect = width / height;
              camera.updateProjectionMatrix();
            };
            const observer = new ResizeObserver(resize);
            observer.observe(preview);
            resize();

            let last = performance.now();
            let animationFrame = 0;
            const animate = (now) => {
              const dt = Math.min(0.05, (now - last) / 1000);
              last = now;
              const time = now / 1000;
              previewTransition.update(dt, {
                speed: 8,
                time,
                turn: Math.sin(time * 0.45) * 0.18,
                jump: 0,
                resistance: 0
              }, time * 0.24);
              const state = previewTransition.getState();
              previewStatus.textContent = `${state.mode} · target ${state.targetRevision} · applied ${state.appliedRevision}`;
              renderer.render(scene, camera);
              animationFrame = requestAnimationFrame(animate);
            };
            animationFrame = requestAnimationFrame(animate);

            disposeShowcase = () => {
              cancelAnimationFrame(animationFrame);
              observer.disconnect();
              previewTransition?.dispose();
              platform.geometry.dispose();
              platform.material.dispose();
              ring.geometry.dispose();
              ring.material.dispose();
              renderer.dispose();
            };
          }

          renderControls();
          startShowcase().catch((error) => {
            console.error(error);
            previewStatus.textContent = "Preview failed";
            preview.innerHTML = `<p style="padding:24px;color:#ffb6a9">Could not start procedural showcase: ${error.message}</p>`;
          });
          addEventListener("beforeunload", () => disposeShowcase(), { once: true });
          JS

          cat > charactercreator.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Prehistoric Rush Character Creator</title>
            <meta name="description" content="Configure and preview the procedural raptor used by Prehistoric Rush.">
            <script type="importmap">
            {
              "imports": {
                "nexusengine": "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine@e8252e51878a08eeef46f54b1aae9e8349a2442b/src/index.js"
              }
            }
            </script>
          </head>
          <body>
            <main id="app" aria-label="Prehistoric Rush character creator">Loading Character Creator</main>
            <script type="module" src="./src/pages/character-creator.js"></script>
          </body>
          </html>
          HTML

          python - <<'PY'
          from pathlib import Path

          game = Path('src/game.js')
          text = game.read_text()

          import_block = 'import { createPrehistoricRushKitGraph } from "./domains/prehistoric-rush/prehistoric-rush-domain-kit.js";\nimport { createPrehistoricPatchGenerator } from "./world/prehistoric-patch-generator.js";\n'
          replacement_imports = import_block + '''import { loadPlayerCharacterProfile } from "./shared/player-character-store.js";
          import {
            KITS_COMMIT,
            NEXUS_COMMIT,
            PROTOKITS_COMMIT,
            RUNTIME_URLS
          } from "./shared/runtime-versions.js";
          import { applyCreaturePose, createCreatureMesh } from "./render/three-procedural-creature.js";
          '''
          if text.count(import_block) != 1:
              raise SystemExit(f'game import block count {text.count(import_block)}')
          text = text.replace(import_block, replacement_imports, 1)

          constants_start = text.find('const NEXUS_COMMIT = ')
          constants_end = text.find('\n\nconst cfg =', constants_start)
          if constants_start < 0 or constants_end < 0:
              raise SystemExit('game runtime constants block not found')
          text = text[:constants_start] + 'const CDN = RUNTIME_URLS;' + text[constants_end:]

          adapter_start = text.find('function createCreatureMesh(')
          grass_start = text.find('function grassGeometry(', adapter_start)
          if adapter_start < 0 or grass_start < 0:
              raise SystemExit('local creature adapter block not found')
          text = text[:adapter_start] + text[grass_start:]

          old_main = 'async function main() {\n  const ui = shell();'
          new_main = 'async function main() {\n  const ui = shell();\n  const playerProfile = loadPlayerCharacterProfile();'
          if text.count(old_main) != 1:
              raise SystemExit('game main marker mismatch')
          text = text.replace(old_main, new_main, 1)

          old_graph = '    kits: createPrehistoricRushKitGraph(NexusEngine, NexusEngineKits, { seed: cfg.seed, goalDistance: cfg.goal })'
          new_graph = '''    kits: createPrehistoricRushKitGraph(NexusEngine, NexusEngineKits, {
              seed: cfg.seed,
              goalDistance: cfg.goal,
              playerCreature: playerProfile.creature
            })'''
          if text.count(old_graph) != 1:
              raise SystemExit(f'game graph marker count {text.count(old_graph)}')
          text = text.replace(old_graph, new_graph, 1)

          host_marker = '      playerBody: { id: playerBody.id, contentHash: playerBody.contentHash, topology: playerBody.topology },'
          host_replacement = '      playerProfile: { profileId: playerProfile.profileId, revision: playerProfile.revision },\n' + host_marker
          if text.count(host_marker) != 1:
              raise SystemExit('game host player body marker mismatch')
          text = text.replace(host_marker, host_replacement, 1)
          game.write_text(text)

          domain = Path('src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js')
          text = domain.read_text()
          destructure_marker = '''  const {
              createSeedKit,
              createProceduralCreatureBodyKit,
              createInstancedRenderBatchKit,
              createSeededWorldPatchControllerKit,
              createCameraSmoothFollowKit
            } = NexusEngineKits;
          '''
          destructure_replacement = destructure_marker + '''  const playerCreature = config.playerCreature ?? PLAYER_RAPTOR_PRESET;
            const playerCreatureId = String(playerCreature.id ?? PLAYER_RAPTOR_ID);
          '''
          if text.count(destructure_marker) != 1:
              raise SystemExit('domain factory destructure marker mismatch')
          text = text.replace(destructure_marker, destructure_replacement, 1)

          replacements = [
            ('    createProceduralCreatureBodyKit({ creatures: [PLAYER_RAPTOR_PRESET] }),', '    createProceduralCreatureBodyKit({ creatures: [playerCreature] }),'),
            ('    createPrehistoricRushDomainKit(NexusEngine, config)', '    createPrehistoricRushDomainKit(NexusEngine, { ...config, playerCreature, playerCreatureId })'),
            ('  let heightSampler = () => 0;', '  let heightSampler = () => 0;\n  const playerCreature = config.playerCreature ?? PLAYER_RAPTOR_PRESET;\n  const playerCreatureId = String(config.playerCreatureId ?? playerCreature.id ?? PLAYER_RAPTOR_ID);'),
            ('      if (!creatureBody?.has?.(PLAYER_RAPTOR_ID)) creatureBody?.create?.(PLAYER_RAPTOR_PRESET);', '      if (!creatureBody?.has?.(playerCreatureId)) creatureBody?.create?.(playerCreature);'),
            ('        getPlayerBody: () => creatureBody.get(PLAYER_RAPTOR_ID),\n        createPlayerPose: (state = {}) => creatureBody.createPose(PLAYER_RAPTOR_ID, state),', '        getPlayerBody: () => creatureBody.get(playerCreatureId),\n        createPlayerPose: (state = {}) => creatureBody.createPose(playerCreatureId, state),')
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'domain replacement expected one match for {old[:60]!r}, found {text.count(old)}')
              text = text.replace(old, new, 1)
          domain.write_text(text)
          PY

          node --check src/shared/runtime-versions.js
          node --check src/render/three-procedural-creature.js
          node --check src/character-creator/character-preview-transition.js
          node --check src/pages/character-creator.js
          node --check src/game.js
          node --check src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js

          test -f charactercreator.html
          grep -F 'type="importmap"' charactercreator.html
          grep -F 'createCharacterPreviewTransition' src/pages/character-creator.js
          grep -F 'createProceduralCreatureBodyKit({ creatures: [draft.creature] })' src/pages/character-creator.js
          grep -F 'playerCreature: playerProfile.creature' src/game.js
          grep -F 'createProceduralCreatureBodyKit({ creatures: [playerCreature] })' src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js
          grep -F 'from "./render/three-procedural-creature.js"' src/game.js
          if grep -F 'function createCreatureMesh(' src/game.js; then
            echo 'local createCreatureMesh remains in game.js' >&2
            exit 1
          fi
          if grep -F 'preview.innerHTML = `' src/pages/character-creator.js; then
            echo 'CSS creature preview remains' >&2
            exit 1
          fi

          node --input-type=module <<'JS'
          import { hasCompatibleCreatureTopology } from './src/render/three-procedural-creature.js';
          const descriptor = {
            geometry: { positions:[0,0,0], normals:[0,1,0], colors:[1,1,1], indices:[0], skinIndices:[0,0,0,0], skinWeights:[1,0,0,0] },
            skeleton: { bones:[{ id:'root' }] }
          };
          if (!hasCompatibleCreatureTopology(descriptor, structuredClone(descriptor))) throw new Error('topology compatibility check failed');
          console.log('shared procedural creature adapter smoke passed');
          JS
          } 2>&1 | tee /tmp/live-procedural-character-creator.log

      - name: Commit live procedural creator
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .agent/live-procedural-character-creator/workflow-error.log
          git add -A
          git commit -m "Use live procedural raptor in character creator"
          git push origin HEAD:main

      - name: Record failure
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .agent/live-procedural-character-creator
          cp /tmp/live-procedural-character-creator.log .agent/live-procedural-character-creator/workflow-error.log 2>/dev/null || echo "workflow failed before log creation" > .agent/live-procedural-character-creator/workflow-error.log
          git add .agent/live-procedural-character-creator/workflow-error.log
          git commit -m "Record live procedural character creator failure" || true
          git push origin HEAD:main || true
