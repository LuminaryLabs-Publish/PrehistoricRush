name: Repair browser page split

on:
  push:
    branches: [main]
    paths:
      - .agent/repair-browser-page-split

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Complete browser page split
        shell: bash
        run: |
          set -euo pipefail

          cat > game.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Prehistoric Rush</title>
            <meta name="description" content="Run a saved procedural raptor through the Prehistoric Rush world.">
            <script type="importmap">
            {
              "imports": {
                "nexusengine": "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine@e8252e51878a08eeef46f54b1aae9e8349a2442b/src/index.js"
              }
            }
            </script>
          </head>
          <body>
            <main id="app" aria-label="Prehistoric Rush game">Loading Prehistoric Rush</main>
            <script type="module" src="./src/pages/game.js"></script>
          </body>
          </html>
          HTML

          cat > charactercreator.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Prehistoric Rush Character Creator</title>
            <meta name="description" content="Configure and save the procedural raptor used by Prehistoric Rush.">
          </head>
          <body>
            <main id="app" aria-label="Prehistoric Rush character creator">Loading Character Creator</main>
            <script type="module" src="./src/pages/character-creator.js"></script>
          </body>
          </html>
          HTML

          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new, label):
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              path.write_text(text.replace(old, new, 1))

          game = Path('src/game.js')
          replace_once(
              game,
              'import { createPrehistoricPatchGenerator } from "./world/prehistoric-patch-generator.js";\n',
              'import { createPrehistoricPatchGenerator } from "./world/prehistoric-patch-generator.js";\nimport { loadPlayerCharacterProfile } from "./shared/player-character-store.js";\n',
              'game profile import'
          )
          replace_once(
              game,
              'async function main() {\n  const ui = shell();',
              'async function main() {\n  const ui = shell();\n  const playerProfile = loadPlayerCharacterProfile();',
              'game profile load'
          )
          replace_once(
              game,
              '    kits: createPrehistoricRushKitGraph(NexusEngine, NexusEngineKits, { seed: cfg.seed, goalDistance: cfg.goal })',
              '    kits: createPrehistoricRushKitGraph(NexusEngine, NexusEngineKits, {\n      seed: cfg.seed,\n      goalDistance: cfg.goal,\n      playerCreature: playerProfile.creature\n    })',
              'game graph profile handoff'
          )
          replace_once(
              game,
              '      playerBody: { id: playerBody.id, contentHash: playerBody.contentHash, topology: playerBody.topology },',
              '      playerProfile: { profileId: playerProfile.profileId, revision: playerProfile.revision },\n      playerBody: { id: playerBody.id, contentHash: playerBody.contentHash, topology: playerBody.topology },',
              'game host profile observation'
          )

          domain = Path('src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js')
          replace_once(
              domain,
              '  const {\n    createSeedKit,\n    createProceduralCreatureBodyKit,\n    createInstancedRenderBatchKit,\n    createSeededWorldPatchControllerKit,\n    createCameraSmoothFollowKit\n  } = NexusEngineKits;\n\n  return [',
              '  const {\n    createSeedKit,\n    createProceduralCreatureBodyKit,\n    createInstancedRenderBatchKit,\n    createSeededWorldPatchControllerKit,\n    createCameraSmoothFollowKit\n  } = NexusEngineKits;\n  const playerCreature = config.playerCreature ?? PLAYER_RAPTOR_PRESET;\n\n  return [',
              'graph player creature selection'
          )
          replace_once(
              domain,
              '    createProceduralCreatureBodyKit({ creatures: [PLAYER_RAPTOR_PRESET] }),',
              '    createProceduralCreatureBodyKit({ creatures: [playerCreature] }),',
              'graph creature install'
          )
          replace_once(
              domain,
              '    createPrehistoricRushDomainKit(NexusEngine, config)',
              '    createPrehistoricRushDomainKit(NexusEngine, { ...config, playerCreature })',
              'graph domain handoff'
          )
          replace_once(
              domain,
              '  let engineRef = null;\n  let heightSampler = () => 0;',
              '  let engineRef = null;\n  let heightSampler = () => 0;\n  const playerCreature = config.playerCreature ?? PLAYER_RAPTOR_PRESET;\n  const playerCreatureId = String(playerCreature.id ?? PLAYER_RAPTOR_ID);',
              'domain player identity'
          )
          replace_once(
              domain,
              '      if (!creatureBody?.has?.(PLAYER_RAPTOR_ID)) creatureBody?.create?.(PLAYER_RAPTOR_PRESET);',
              '      if (!creatureBody?.has?.(playerCreatureId)) creatureBody?.create?.(playerCreature);',
              'domain creature creation'
          )
          replace_once(
              domain,
              '        getPlayerBody: () => creatureBody.get(PLAYER_RAPTOR_ID),\n        createPlayerPose: (state = {}) => creatureBody.createPose(PLAYER_RAPTOR_ID, state),',
              '        getPlayerBody: () => creatureBody.get(playerCreatureId),\n        createPlayerPose: (state = {}) => creatureBody.createPose(playerCreatureId, state),',
              'domain creature access'
          )

          deploy = Path('.github/workflows/deploy-pages.yml')
          replace_once(
              deploy,
              '          cp index.html _site/index.html',
              '          cp index.html menu.html charactercreator.html game.html _site/',
              'Pages root pages'
          )
          PY

          rm -f src/runtime.mjs

          node --check src/pages/menu.js
          node --check src/pages/character-creator.js
          node --check src/pages/game.js
          node --check src/shared/player-character-schema.js
          node --check src/shared/player-character-store.js
          node --check src/game.js
          node --check src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js

          test -f index.html
          test -f menu.html
          test -f charactercreator.html
          test -f game.html
          test ! -e src/runtime.mjs

          grep -F 'src/pages/menu.js' index.html menu.html
          grep -F 'src/pages/character-creator.js' charactercreator.html
          grep -F 'src/pages/game.js' game.html
          grep -F 'menu.html charactercreator.html game.html' .github/workflows/deploy-pages.yml
          grep -F 'playerCreature: playerProfile.creature' src/game.js
          grep -F 'createProceduralCreatureBodyKit({ creatures: [playerCreature] })' src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js

          if grep -R --line-number 'runtime\.mjs' index.html menu.html charactercreator.html game.html src .github/workflows/deploy-pages.yml; then
            echo 'runtime.mjs reference remains' >&2
            exit 1
          fi

      - name: Commit completed page split
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete menu creator and game page split"
          git push origin HEAD:main
