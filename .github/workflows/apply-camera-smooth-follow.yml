name: Apply camera smooth follow

on:
  push:
    branches: [main]
    paths:
      - .agent/apply-camera-smooth-follow

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Apply scoped camera integration
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee /tmp/camera-integration.log
          from pathlib import Path
          from textwrap import dedent, indent

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          game_path = Path("src/game.js")
          game = game_path.read_text()
          game = replace_once(game,
              'const KITS_COMMIT = "9546a6fb25b4c6a7b65432df068701a4627ab20f";',
              'const KITS_COMMIT = "5d3613b140ca33395f180acde014c167addf0ccc";',
              "pin kits")
          game = replace_once(game,
              '  patchKit: `https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine-Kits@${KITS_COMMIT}/kits/simulation/seeded-world-patch-controller-kit/index.js`,\n  three:',
              '  patchKit: `https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine-Kits@${KITS_COMMIT}/kits/simulation/seeded-world-patch-controller-kit/index.js`,\n  cameraKit: `https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine-Kits@${KITS_COMMIT}/kits/camera-feedback/camera-smooth-follow-kit/index.js`,\n  three:',
              "camera CDN")
          game = replace_once(game,
              'function createThreeAdapter(THREE, game, physics, ui, instanceBatches) {',
              'function createThreeAdapter(THREE, game, physics, ui, instanceBatches, cameraFollow) {',
              "adapter signature")
          game = replace_once(game,
              '  const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 900);\n  const renderer =',
              '  const camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 900);\n  const cameraTargets = { position: [0, 0, 0], lookPoint: [0, 0, 0] };\n  let cameraRunId = null;\n  const renderer =',
              "persistent camera targets")
          helpers = indent(dedent('''
          function setCameraTargets(state) {
            const ahead = route.samples[Math.min(route.samples.length - 1, state.routeIndex + 12)] ?? route.samples[state.routeIndex];
            const backX = -Math.sin(state.yaw);
            const backZ = -Math.cos(state.yaw);
            cameraTargets.position[0] = state.x + backX * 6.6;
            cameraTargets.position[1] = state.y + 2.35;
            cameraTargets.position[2] = state.z + backZ * 6.6;
            cameraTargets.lookPoint[0] = ahead.x;
            cameraTargets.lookPoint[1] = sampleHeight(ahead.x, ahead.z) + 1.15;
            cameraTargets.lookPoint[2] = ahead.z;
          }

          function applyCameraTransform(transform) {
            camera.position.fromArray(transform.position);
            camera.quaternion.fromArray(transform.quaternion);
          }

          function resetCamera(state, reason = "run-reset") {
            setCameraTargets(state);
            cameraRunId = state.runId;
            const transform = cameraFollow.reset({
              position: cameraTargets.position,
              lookPoint: cameraTargets.lookPoint,
              reason
            });
            applyCameraTransform(transform);
            return transform;
          }
          ''').strip(), '  ') + '\n\n'
          game = replace_once(game,
              '  function render(state, dt) {',
              helpers + '  function render(state, dt) {',
              "camera helpers")
          old_camera = (
              '    const ahead = route.samples[Math.min(route.samples.length - 1, state.routeIndex + 12)] ?? route.samples[state.routeIndex];\n'
              '    const backX = -Math.sin(state.yaw);\n'
              '    const backZ = -Math.cos(state.yaw);\n'
              '    camera.position.lerp(new THREE.Vector3(state.x + backX * 6.6, state.y + 2.35, state.z + backZ * 6.6), 1 - Math.exp(-8.5 * dt));\n'
              '    camera.lookAt(ahead.x, sampleHeight(ahead.x, ahead.z) + 1.15, ahead.z);'
          )
          new_camera = (
              '    setCameraTargets(state);\n'
              '    const cameraTransform = cameraRunId !== state.runId\n'
              '      ? resetCamera(state, "run-change")\n'
              '      : cameraFollow.update({\n'
              '          targetPosition: cameraTargets.position,\n'
              '          targetLookPoint: cameraTargets.lookPoint,\n'
              '          deltaTime: Math.min(dt, 1 / 30)\n'
              '        });\n'
              '    applyCameraTransform(cameraTransform);'
          )
          game = replace_once(game, old_camera, new_camera, "camera render")
          game = replace_once(game,
              '    sampleHeight,\n    activatePatch,',
              '    sampleHeight,\n    resetCamera,\n    activatePatch,',
              "expose reset")
          game = replace_once(game,
              '  const [NexusEngine, SeedModule, CreatureModule, BatchModule, PatchModule, THREE] = await Promise.all([',
              '  const [NexusEngine, SeedModule, CreatureModule, BatchModule, PatchModule, CameraModule, THREE] = await Promise.all([',
              "load tuple")
          game = replace_once(game,
              '    load(CDN.patchKit),\n    load(CDN.three)',
              '    load(CDN.patchKit),\n    load(CDN.cameraKit),\n    load(CDN.three)',
              "load camera")
          game = replace_once(game,
              '  if (!NexusEngine || !SeedModule || !CreatureModule || !BatchModule || !PatchModule || !THREE) {',
              '  if (!NexusEngine || !SeedModule || !CreatureModule || !BatchModule || !PatchModule || !CameraModule || !THREE) {',
              "camera required")
          game = replace_once(game,
              '  const NexusEngineKits = { ...SeedModule, ...CreatureModule, ...BatchModule, ...PatchModule };',
              '  const NexusEngineKits = { ...SeedModule, ...CreatureModule, ...BatchModule, ...PatchModule, ...CameraModule };',
              "kit module composition")
          game = replace_once(game,
              '  const patchControllers = engine.n.seededWorldPatchController;\n  if (!game || !instanceBatches || !patchControllers) throw new Error("PrehistoricRush composition did not install.");',
              '  const patchControllers = engine.n.seededWorldPatchController;\n  const cameraFollows = engine.n.cameraSmoothFollow;\n  if (!game || !instanceBatches || !patchControllers || !cameraFollows) throw new Error("PrehistoricRush composition did not install.");',
              "camera service")
          camera_create = indent(dedent('''
          const cameraFollow = cameraFollows.create({
            id: "prehistoric-rush-player-camera",
            positionSmoothTime: 0.22,
            lookSmoothTime: 0.14,
            maximumPositionSpeed: 45,
            maximumLookSpeed: 65,
            rotationSharpness: 12,
            maximumDeltaTime: 1 / 30,
            teleportThreshold: 24
          });
          const adapter = createThreeAdapter(THREE, game, physics, ui, instanceBatches, cameraFollow);
          ''').strip(), '  ')
          game = replace_once(game,
              '  const adapter = createThreeAdapter(THREE, game, physics, ui, instanceBatches);',
              camera_create,
              "create camera follow")
          game = replace_once(game,
              '  game.start();\n  updateStreaming(game.getState(), true);',
              '  game.start();\n  updateStreaming(game.getState(), true);\n  adapter.resetCamera(game.getState(), "initial-run");',
              "initial camera reset")
          game = replace_once(game,
              '    game.start();\n    updateStreaming(game.getState(), true);\n  };',
              '    game.start();\n    updateStreaming(game.getState(), true);\n    adapter.resetCamera(game.getState(), "run-restart");\n  };',
              "restart camera reset")
          game = replace_once(game,
              '    patchController: controller,\n    versions:',
              '    patchController: controller,\n    cameraFollow,\n    versions:',
              "host camera")
          game = replace_once(game,
              '      patchStreaming: controller.getSnapshot(),\n      composition:',
              '      patchStreaming: controller.getSnapshot(),\n      camera: cameraFollow.getSnapshot(),\n      composition:',
              "camera snapshot")
          game = replace_once(game,
              '      renderer: "three-seeded-patch-streaming-v5"',
              '      renderer: "three-seeded-patch-streaming-smooth-camera-v6"',
              "renderer version")
          game_path.write_text(game)

          domain_path = Path("src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js")
          domain = domain_path.read_text()
          domain = replace_once(domain,
              '    "createInstancedRenderBatchKit",\n    "createSeededWorldPatchControllerKit"',
              '    "createInstancedRenderBatchKit",\n    "createSeededWorldPatchControllerKit",\n    "createCameraSmoothFollowKit"',
              "require camera factory")
          domain = replace_once(domain,
              '    createInstancedRenderBatchKit,\n    createSeededWorldPatchControllerKit',
              '    createInstancedRenderBatchKit,\n    createSeededWorldPatchControllerKit,\n    createCameraSmoothFollowKit',
              "destructure camera factory")
          domain = replace_once(domain,
              '    createSeededWorldPatchControllerKit(),\n    createPrehistoricRushDomainKit',
              '    createSeededWorldPatchControllerKit(),\n    createCameraSmoothFollowKit(),\n    createPrehistoricRushDomainKit',
              "install camera kit")
          domain = replace_once(domain,
              '    version: "0.4.0",',
              '    version: "0.5.0",',
              "game domain version")
          domain = replace_once(domain,
              '        "seeded-world-patch-controller-kit"\n      ],',
              '        "seeded-world-patch-controller-kit",\n        "camera-smooth-follow-kit"\n      ],',
              "composition metadata")
          domain_path.write_text(domain)
          print("camera integration replacements completed")
          PY
          node --check src/game.js | tee -a /tmp/camera-integration.log
          node --check src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js | tee -a /tmp/camera-integration.log
      - name: Commit camera integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game.js src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js
          git commit -m "Damp PrehistoricRush camera movement and rotation"
          git push origin HEAD:main
      - name: Record failure
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .agent/camera-smooth-follow
          cp /tmp/camera-integration.log .agent/camera-smooth-follow/workflow-error.log 2>/dev/null || echo "workflow failed before log creation" > .agent/camera-smooth-follow/workflow-error.log
          git add .agent/camera-smooth-follow/workflow-error.log
          git commit -m "Record smooth camera integration failure" || true
          git push origin HEAD:main || true
