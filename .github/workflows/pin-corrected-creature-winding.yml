name: Pin corrected procedural creature winding

on:
  push:
    branches: [main]
    paths:
      - .agent/pin-corrected-creature-winding

permissions:
  contents: write

jobs:
  pin:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Advance immutable Kits pin
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('src/game.js')
          text = path.read_text()
          old = 'const KITS_COMMIT = "5d3613b140ca33395f180acde014c167addf0ccc";'
          new = 'const KITS_COMMIT = "ae7ebda62f7c264bbde49c939a62e1a04fd60784";'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one old Kits pin, found {count}')
          path.write_text(text.replace(old, new, 1))
          PY
          node --check src/game.js
          grep -F 'const KITS_COMMIT = "ae7ebda62f7c264bbde49c939a62e1a04fd60784";' src/game.js
      - name: Commit pin update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game.js
          git commit -m "Consume corrected procedural creature winding"
          git push origin HEAD:main
