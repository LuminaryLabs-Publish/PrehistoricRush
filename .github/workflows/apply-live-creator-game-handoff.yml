name: Apply live creator game handoff

on:
  push:
    branches: [main]
    paths:
      - .agent/apply-live-creator-game-handoff

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Share adapter and selected profile with game
        shell: bash
        run: |
          set -o pipefail
          {
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          game = Path('src/game.js')
          text = game.read_text()
          imports = 'import { createPrehistoricRushKitGraph } from "./domains/prehistoric-rush/prehistoric-rush-domain-kit.js";\nimport { createPrehistoricPatchGenerator } from "./world/prehistoric-patch-generator.js";\n'
          added = imports + '''import { loadPlayerCharacterProfile } from "./shared/player-character-store.js";
          import {
            KITS_COMMIT,
            NEXUS_COMMIT,
            PROTOKITS_COMMIT,
            RUNTIME_URLS
          } from "./shared/runtime-versions.js";
          import { applyCreaturePose, createCreatureMesh } from "./render/three-procedural-creature.js";
          '''
          if text.count(imports) != 1:
              raise SystemExit(f'game import marker count {text.count(imports)}')
          text = text.replace(imports, added, 1)

          start = text.find('const NEXUS_COMMIT = ')
          end = text.find('\n\nconst cfg =', start)
          if start < 0 or end < 0:
              raise SystemExit('game runtime constants block not found')
          text = text[:start] + 'const CDN = RUNTIME_URLS;' + text[end:]

          start = text.find('function createCreatureMesh(')
          end = text.find('function grassGeometry(', start)
          if start < 0 or end < 0:
              raise SystemExit('game local creature adapter block not found')
          text = text[:start] + text[end:]

          replacements = [
            ('async function main() {\n  const ui = shell();', 'async function main() {\n  const ui = shell();\n  const playerProfile = loadPlayerCharacterProfile();'),
            ('    kits: createPrehistoricRushKitGraph(NexusEngine, NexusEngineKits, { seed: cfg.seed, goalDistance: cfg.goal })', '''    kits: createPrehistoricRushKitGraph(NexusEngine, NexusEngineKits, {
              seed: cfg.seed,
              goalDistance: cfg.goal,
              playerCreature: playerProfile.creature
            })'''),
            ('      playerBody: { id: playerBody.id, contentHash: playerBody.contentHash, topology: playerBody.topology },', '      playerProfile: { profileId: playerProfile.profileId, revision: playerProfile.revision },\n      playerBody: { id: playerBody.id, contentHash: playerBody.contentHash, topology: playerBody.topology },')
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'game replacement count {text.count(old)} for {old[:60]!r}')
              text = text.replace(old, new, 1)
          game.write_text(text)

          domain = Path('src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js')
          text = domain.read_text()
          marker = '''  const {
              createSeedKit,
              createProceduralCreatureBodyKit,
              createInstancedRenderBatchKit,
              createSeededWorldPatchControllerKit,
              createCameraSmoothFollowKit
            } = NexusEngineKits;
          '''
          addition = marker + '''  const playerCreature = config.playerCreature ?? PLAYER_RAPTOR_PRESET;
            const playerCreatureId = String(playerCreature.id ?? PLAYER_RAPTOR_ID);
          '''
          if text.count(marker) != 1:
              raise SystemExit(f'domain factory marker count {text.count(marker)}')
          text = text.replace(marker, addition, 1)
          replacements = [
            ('    createProceduralCreatureBodyKit({ creatures: [PLAYER_RAPTOR_PRESET] }),', '    createProceduralCreatureBodyKit({ creatures: [playerCreature] }),'),
            ('    createPrehistoricRushDomainKit(NexusEngine, config)', '    createPrehistoricRushDomainKit(NexusEngine, { ...config, playerCreature, playerCreatureId })'),
            ('  let heightSampler = () => 0;', '  let heightSampler = () => 0;\n  const playerCreature = config.playerCreature ?? PLAYER_RAPTOR_PRESET;\n  const playerCreatureId = String(config.playerCreatureId ?? playerCreature.id ?? PLAYER_RAPTOR_ID);'),
            ('      if (!creatureBody?.has?.(PLAYER_RAPTOR_ID)) creatureBody?.create?.(PLAYER_RAPTOR_PRESET);', '      if (!creatureBody?.has?.(playerCreatureId)) creatureBody?.create?.(playerCreature);'),
            ('        getPlayerBody: () => creatureBody.get(PLAYER_RAPTOR_ID),\n        createPlayerPose: (state = {}) => creatureBody.createPose(PLAYER_RAPTOR_ID, state),', '        getPlayerBody: () => creatureBody.get(playerCreatureId),\n        createPlayerPose: (state = {}) => creatureBody.createPose(playerCreatureId, state),')
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'domain replacement count {text.count(old)} for {old[:60]!r}')
              text = text.replace(old, new, 1)
          domain.write_text(text)
          PY

          node --check src/shared/runtime-versions.js
          node --check src/render/three-procedural-creature.js
          node --check src/character-creator/character-preview-transition.js
          node --check src/pages/character-creator.js
          node --check src/game.js
          node --check src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js
          grep -F 'playerCreature: playerProfile.creature' src/game.js
          grep -F 'createProceduralCreatureBodyKit({ creatures: [playerCreature] })' src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js
          grep -F 'from "./render/three-procedural-creature.js"' src/game.js
          grep -F 'createProceduralCreatureBodyKit({ creatures: [draft.creature] })' src/pages/character-creator.js
          grep -F 'border-radius:55% 48% 45% 55%' src/pages/character-creator.js && exit 1 || true
          if grep -F 'function createCreatureMesh(' src/game.js; then exit 1; fi
          node --input-type=module <<'JS'
          import { hasCompatibleCreatureTopology } from './src/render/three-procedural-creature.js';
          const value = { geometry:{ positions:[0,0,0], normals:[0,1,0], colors:[1,1,1], indices:[0], skinIndices:[0,0,0,0], skinWeights:[1,0,0,0] }, skeleton:{ bones:[{id:'root'}] } };
          if (!hasCompatibleCreatureTopology(value, structuredClone(value))) throw new Error('shared topology smoke failed');
          console.log('live procedural character creator smoke passed');
          JS
          } 2>&1 | tee /tmp/live-creator-game-handoff.log
      - name: Commit selected profile handoff
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .agent/live-creator-game-handoff/workflow-error.log
          git add src/game.js src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js .agent/live-creator-game-handoff/workflow-error.log 2>/dev/null || git add src/game.js src/domains/prehistoric-rush/prehistoric-rush-domain-kit.js
          git commit -m "Use saved procedural character in game"
          git push origin HEAD:main
      - name: Record failure
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .agent/live-creator-game-handoff
          cp /tmp/live-creator-game-handoff.log .agent/live-creator-game-handoff/workflow-error.log 2>/dev/null || echo "workflow failed before log creation" > .agent/live-creator-game-handoff/workflow-error.log
          git add .agent/live-creator-game-handoff/workflow-error.log
          git commit -m "Record live creator game handoff failure" || true
          git push origin HEAD:main || true
